<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blind Spot - The Nightmare Update</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #gameCanvas {
            display: block; width: 100%; height: 100%; position: absolute; z-index: 1;
        }
        
        /* UI HUD */
        #uiLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; z-index: 5; display: none;
        }
        .top-bar { padding: 20px; display: flex; justify-content: flex-start; align-items: flex-start; }
        #objectivePanel { background: rgba(0,0,0,0.6); border: 1px solid #444; padding: 10px 15px; border-radius: 5px; }
        #objectiveTitle { color: #aaa; font-size: 12px; margin-bottom: 5px; }
        #objectiveValue { color: #fff; font-size: 22px; font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .bottom-center { display: flex; justify-content: center; padding: 0 0 24px 0; }
        .meter-container { display: flex; flex-direction: row; align-items: center; gap: 18px; background: rgba(0,0,0,0.65); padding: 10px 20px; border-radius: 30px; border: 1px solid #333; }
        .meter-label { color: #ccc; font-size: 11px; margin-bottom: 3px; text-align: center; }
        .meter-group { display: flex; flex-direction: column; align-items: center; }
        #focusBarBg { width: 160px; height: 8px; background: rgba(255,255,255,0.15); border-radius: 5px; overflow: hidden; }
        #focusBarFill { width: 100%; height: 100%; background: #00ffcc; transition: background 0.2s; }
        .meter-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.15); }
        .sparks-group { display: flex; flex-direction: column; align-items: center; }

        /* Screens */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto;
            color: white; text-align: center; z-index: 10;
        }
        h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 2px 2px 0 #f00; letter-spacing: 2px; }
        h2 { font-size: 24px; color: #ffcc00; margin-bottom: 20px; }
        p { font-size: 14px; max-width: 90%; line-height: 1.5; color: #ccc; margin-bottom: 20px; }
        .btn {
            margin: 10px; padding: 12px 30px; font-size: 18px; background: #fff; color: #000;
            border: 2px solid #fff; border-radius: 5px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .btn:active { background: #ccc; }
        .btn-outline { background: transparent; color: #fff; }
        .btn-outline:active { background: rgba(255,255,255,0.2); }

        /* Map Menu */
        #mapScreen { background: #0a0a0a; justify-content: flex-start; overflow-y: auto; padding: 40px 0; align-items: center; }
        .saga-container { width: 90%; max-width: 500px; margin-bottom: 30px; background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; text-align: center; }
        .saga-title { color: #ff4444; font-size: 18px; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .saga-desc { font-size: 12px; color: #888; margin-bottom: 15px; }
        .level-grid { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .lvl-btn { width: 50px; height: 50px; background: #222; color: #555; border: 2px solid #333; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: not-allowed; display: flex; align-items: center; justify-content: center; }
        .lvl-btn.unlocked { background: #000; color: #fff; border-color: #00ffcc; cursor: pointer; box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }
        .lvl-btn.unlocked:active { background: #00ffcc; color: #000; }
        .lvl-btn.completed { background: #00ffcc; color: #000; border-color: #00ffcc; }

        /* Effects */
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px rgba(0,0,0,0.8); transition: box-shadow 0.1s; pointer-events: none; z-index: 2; }
        .static {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0; pointer-events: none; mix-blend-mode: screen; z-index: 3;
        }
        #jumpscare { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; pointer-events: none; z-index: 20; display: none; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div class="vignette" id="vignette"></div>
    <div class="static" id="staticNoise"></div>
    <div id="jumpscare"></div>

    <div id="uiLayer">
        <div class="top-bar">
            <div id="objectivePanel">
                <div id="objectiveTitle">MỤC TIÊU</div>
                <div id="objectiveValue">00:00</div>
            </div>
        </div>
        <div class="bottom-center">
            <div class="meter-container">
                <div class="meter-group">
                    <div class="meter-label">TỈNH TÁO</div>
                    <div id="focusBarBg"><div id="focusBarFill"></div></div>
                </div>
                <div class="meter-divider"></div>
                <div class="sparks-group">
                    <div class="meter-label" style="color:#ffea00;">SỨC MẠNH</div>
                    <div id="sparksValue" style="color:#ffea00; font-size:18px; font-weight:bold; line-height:1;">100</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Menus -->
    <div id="mapScreen" class="screen">
        <h1 style="margin-top: 20px;">BLIND SPOT</h1>
        <div id="mapSparksDisplay" style="color: #ffea00; font-size: 20px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 5px rgba(255,234,0,0.5);">SỨC MẠNH HIỆN CÓ: 100</div>
        <p>Bóng tối không đáng sợ bằng những thứ bên trong nó.</p>
        
        <button id="unlockBtn" class="btn btn-outline" style="font-size: 12px; padding: 8px 15px; margin-top: -10px; margin-bottom: 20px; border-color: #555; color: #aaa;" onclick="toggleUnlockAllLevels()">🔓 Mở Khóa Tất Cả Màn Chơi</button>
        <div id="sagasContainer" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div id="startScreen" class="screen" style="display: none; background-color: #000; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
        <h2 id="preLevelTitle" style="color: #ff0000; font-size: 50px; font-weight: 900; letter-spacing: 10px; text-shadow: 0 0 20px rgba(255,0,0,0.8); margin-bottom: 20px; font-family: 'Courier New', Courier, monospace;">MAP 1: HÀNH LANG MÁU</h2>
        <p id="preLevelDesc" style="color: #fff; font-size: 18px; text-align: center; max-width: 600px; margin-bottom: 20px; line-height: 1.5; font-family: 'Courier New', Courier, monospace; letter-spacing: 2px;">Chuẩn bị tinh thần.</p>
        <div style="color: #ff3333; font-size: 24px; font-weight: bold; margin-bottom: 50px; text-shadow: 0 0 10px rgba(255,51,51,0.5);" id="preLevelObjective">MỤC TIÊU: SỐNG SÓT X GIÂY</div>
        <button class="btn" style="background: transparent; color: #ff0000; border: 2px solid #ff0000; font-size: 20px; padding: 15px 40px; box-shadow: inset 0 0 10px rgba(255,0,0,0.5), 0 0 20px rgba(255,0,0,0.5); font-weight: bold; font-family: 'Courier New', Courier, monospace;" onclick="startGame()">▶ TIẾN VÀO BÓNG TỐI</button>
        <button class="btn btn-outline" style="border-color: #555; color: #aaa; margin-top: 20px; font-family: 'Courier New', Courier, monospace;" onclick="showMap()">QUAY LẠI</button>
    </div>

    <div id="winScreen" class="screen" style="display: none;">
        <h1 style="color: #00ffcc;">LEVEL CLEARED</h1>
        <button class="btn" onclick="nextLevel()">MÀN TIẾP THEO</button>
        <button class="btn btn-outline" onclick="showMap()">BẢN ĐỒ</button>
    </div>

    <div id="gameOverScreen" class="screen" style="display: none;">
        <h1 style="color: #ff3333;">YOU DIED</h1>
        <p id="deathReasonText" style="color: #ff8888; font-size: 15px; margin: 0 0 8px 0; font-weight: bold; letter-spacing: 1px;"></p>
        <p id="deathTipText" style="color: #aaa; font-size: 12px; max-width: 320px; line-height: 1.6; margin: 0 0 20px 0;"></p>
        <button class="btn" onclick="startGame()">THỬ LẠI</button>
        <button class="btn btn-outline" onclick="showMap()">BẢN ĐỒ</button>
    </div>

    <!-- Màn hình chờ Loading -->
    <div id="loadingScreen" class="screen" style="z-index: 100000; display: flex; background-color: #050505; flex-direction: column;">
        <h1 style="color: #ff3333; font-size: 30px; letter-spacing: 5px; text-shadow: 0 0 10px rgba(255,0,0,0.5);">ĐANG KẾT NỐI VÀO ÁC MỘNG...</h1>
        <div style="width: 300px; height: 10px; background: #222; border: 1px solid #444; margin-top: 20px; box-shadow: 0 0 10px #000;">
            <div id="loadingBar" style="width: 0%; height: 100%; background: #ff3333; transition: width 0.2s;"></div>
        </div>
        <p id="loadingText" style="color: #aaa; margin-top: 15px; font-weight: bold;">0%</p>
    </div>

<script>
    // --- CẤU HÌNH DATA 5 MAP ĐỈNH CAO ---
    const gameLevels = [
        { id: 0, name: "MAP 1", title: "HÀNH LANG MÁU", desc: "Ánh sáng là sự sống.", reqSparks: 0, type: "survive", target: 75, spawnRate: 1.5, types: ['watcher', 'wisp'], env: { bgUrl: 'https://i.ibb.co/xSPQszZ8/Map1dasua.png' } },
        { id: 1, name: "MAP 2", title: "CĂN PHÒNG CŨ", desc: "Tắt đèn hoặc CHẾT.", reqSparks: 200, type: "survive", target: 90, spawnRate: 1.2, types: ['watcher', 'sprinter', 'moth', 'wisp'], env: { bgUrl: 'https://i.ibb.co/6Rk32TYS/Map-2-s-a.png', narrow: true } },
        { id: 2, name: "MAP 3", title: "BỆNH VIỆN", desc: "Ảo giác bủa vây", reqSparks: 400, type: "survive", target: 90, spawnRate: 1.0, types: ['watcher', 'sprinter', 'stalker', 'moth', 'wisp'], env: { bgUrl: 'https://i.ibb.co/1tYF1S0B/Map-3-s-a.png', fastDrain: true } },
        { id: 3, name: "MAP 4", title: "RỪNG MÙ SƯƠNG", desc: "Không còn nơi an toàn", reqSparks: 600, type: "survive", target: 120, spawnRate: 0.8, types: ['sprinter', 'phantom', 'stalker', 'moth', 'wisp'], env: { bgUrl: 'https://i.ibb.co/SXMC6vF2/Map-4-s-a.png', shortLight: true, flicker: true } },
        { id: 4, name: "MAP 5", title: "VỰC THẲM", desc: "Hãy nhắm mắt lại...", reqSparks: 800, type: "survive", target: 150, spawnRate: 0.6, types: ['watcher', 'sprinter', 'phantom', 'stalker', 'moth', 'wisp'], env: { bgUrl: 'https://i.ibb.co/0j1PPCZB/Map-5-s-a.png', shortLight: true, narrow: true, fastDrain: true, flicker: true } }
    ];

    let maxUnlockedLevel = 0;
    let realMaxUnlockedLevel = 0;
    let isAllUnlocked = false;
    let currentSelectedLevel = 0;

    // --- GAME ENGINE ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiLayer = document.getElementById('uiLayer');
    const focusFill = document.getElementById('focusBarFill');
    const vignette = document.getElementById('vignette');
    const staticNoise = document.getElementById('staticNoise');
    const jumpscare = document.getElementById('jumpscare');
    const objectiveValueEl = document.getElementById('objectiveValue');
    const objectiveTitleEl = document.getElementById('objectiveTitle');

    // --- ẢNH NHÂN VẬT ---
    const playerImg = new Image();
    playerImg.src = 'https://i.ibb.co/355cMVsd/Thi-t-k-ch-a-c-t-n.png'; // Link ảnh ví dụ (thay bằng ảnh thật của bạn)
    let isPlayerImgLoaded = false;
    playerImg.onload = () => { isPlayerImgLoaded = true; };

    // --- ẢNH BACKGROUND (Cache để mượt hơn) ---
    const bgImages = {};
    function getBgImage(url) {
        if (!url) return null;
        if (!bgImages[url]) {
            bgImages[url] = new Image();
            bgImages[url].src = url;
        }
        return bgImages[url].complete && bgImages[url].naturalWidth !== 0 ? bgImages[url] : null;
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Audio pool cho footstep — 6 slot xoay vòng, cho phép nhiều tiếng chồng lên nhau
    const FOOTSTEP_URL = 'https://www.image2url.com/r2/default/audio/1779863251086-c7e11127-32bd-42f2-9594-49639c15cef9.mp3';
    const footstepPool = Array.from({ length: 2 }, () => {
        const a = new Audio(FOOTSTEP_URL);
        a.preload = 'auto';
        return a;
    });
    let footstepPoolIdx = 0;

    // Helper: kết nối gainNode vào destination với stereo pan, có fallback nếu trình duyệt không hỗ trợ
    function connectWithPan(gainNode, pan) {
        if (audioCtx.createStereoPanner) {
            const panner = audioCtx.createStereoPanner();
            panner.pan.value = Math.max(-1, Math.min(1, pan));
            gainNode.connect(panner);
            panner.connect(audioCtx.destination);
        } else {
            gainNode.connect(audioCtx.destination);
        }
    }

    // Tiếng bước chân — dùng audio pool, volume theo khoảng cách
    function playFootstep(dist, pan = 0) {
        let vol = Math.min(1, Math.max(0.2, 1 - dist / 500));
        const audio = footstepPool[footstepPoolIdx];
        footstepPoolIdx = (footstepPoolIdx + 1) % footstepPool.length;
        audio.volume = vol;
        audio.currentTime = 0;
        audio.play().catch(() => {});
    }

    // Tiếng rít của Moth (Nghịch lý)
    function playShriek() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.25);
        gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.25);
    }

    function playHeartbeat(isFake = false) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(isFake ? 60 : 50, audioCtx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        gainNode.gain.setValueAtTime(isFake ? 0.6 : 1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    let staticSoundNode = null, staticGain = null;
    function startStaticSound() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        if(!staticSoundNode) {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            staticSoundNode = audioCtx.createBufferSource();
            staticSoundNode.buffer = buffer;
            staticSoundNode.loop = true;
            staticGain = audioCtx.createGain();
            staticGain.gain.value = 0;
            staticSoundNode.connect(staticGain);
            staticGain.connect(audioCtx.destination);
            staticSoundNode.start();
        }
    }
    function updateStaticSound(intensity) {
        if(staticGain) staticGain.gain.setTargetAtTime(intensity * 0.3, audioCtx.currentTime, 0.1); 
    }

    function playJumpscare() {
        // Nếu có link file mp3/wav riêng biệt thì play
        if (scareAudioPlayer.src && scareAudioPlayer.src !== window.location.href) {
            scareAudioPlayer.currentTime = 0;
            scareAudioPlayer.play().catch(e => console.log("Không thể play audio ma", e));
        }

        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.5);
        gainNode.gain.setValueAtTime(1, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }
    function playDeathSound() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    // Tiếng vật thể rơi/vỡ — burst noise tần số cao, tắt nhanh
    function playAmbientBreaking(pan = 0) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const bufSize = Math.floor(audioCtx.sampleRate * 0.45);
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 1.8);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass'; filter.frequency.value = 900;
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        src.connect(filter); filter.connect(gain);
        connectWithPan(gain, pan);
        src.start();
    }

    // Tiếng kéo lê — rumble + crackle trung tần để nghe được trên mọi loa
    function playAmbientDragging(pan = 0) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const duration = 1.2 + Math.random() * 0.8;
        const bufSize = Math.floor(audioCtx.sampleRate * duration);
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) {
            let t = i / bufSize;
            data[i] = (Math.random() * 2 - 1) * 0.7 * (Math.sin(t * 35) * 0.25 + 0.75);
        }
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = 600; filter.Q.value = 0.5;
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
        src.connect(filter); filter.connect(gain);
        connectWithPan(gain, pan);
        src.start();
    }

    // Tiếng la xa — oscillator mô phỏng tiếng hét vọng lại từ xa
    function playDistantScream(pan = 0) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(260 + Math.random() * 80, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(440, audioCtx.currentTime + 0.25);
        osc.frequency.linearRampToValueAtTime(170, audioCtx.currentTime + 0.9);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.1);
        gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.75);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.1);
        filter.type = 'bandpass'; filter.frequency.value = 1100; filter.Q.value = 0.9;
        osc.connect(filter); filter.connect(gain);
        connectWithPan(gain, pan);
        osc.start(); osc.stop(audioCtx.currentTime + 1.1);
    }

    // --- GAME STATE ---
    let gameState = 'menu';
    let levelData = null;
    let timeSurvived = 0, killsThisLevel = 0, lastTime = 0;
    let playerHP = 3;
    const maxPlayerHP = 3;
    let isLightOn = false, isHoldingTouch = false, isForcedBlink = false;
    let forcedBlinkTimer = 0, randomFlickerTimer = 0;
    let lightAngle = 0, focus = 100;
    
    // Nỗi sợ tột độ (Jumpscare system)
    let isSubliminalScareActive = false;
    let subliminalTimer = 0;
    let subliminalCooldown = 0;
    let scareImgAlpha = 0;
    let hasPlayedScareSound = false;

    const scareImg = new Image();
    let isScareImgLoaded = false;
    scareImg.onload = () => { isScareImgLoaded = true; };

    // --- MẢNG 5 LINK TƯƠNG ỨNG VỚI 5 MAP ---
    // Bạn dán 5 link ảnh ma khác nhau vào đây theo thứ tự nhé
    const scareImageUrls = [
        'https://genk.mediacdn.vn/2019/12/30/photo-1-15776759150391249485486.jpg', // Map 1
        'https://cdn.xtmobile.vn/upload/news/content_prod/3IWNnSBU_top-phim-ma-bup-be-kinh-di-nhat-ac-quy-tro-ve-xtmobile.jpg', // Map 2

    let center = { x: canvas.width/2, y: canvas.height/2 }, playerRadius = 15;
    
    let enemies = [];

    // --- TUTORIAL SYSTEM ---
